name: Deploy PP Platform to Azure

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Deploy Frontend to Azure App Service
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Azure App Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build Frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_AD_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_AD_AUTHORITY: ${{ secrets.NEXT_PUBLIC_AZURE_AD_AUTHORITY }}
        run: |
          cd client
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          package: ./client/out
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Deploy Backend to Azure App Service
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Build TypeScript
        run: |
          cd server
          npm run build

      - name: Prepare deployment package
        run: |
          # Copy package files into dist so Azure has everything it needs
          cp server/package.json server/dist/package.json
          cp server/package-lock.json server/dist/package-lock.json
          # Copy web.config for IIS routing on Windows App Service
          cp server/web.config server/dist/web.config

      - name: Install production dependencies in dist
        run: |
          cd server/dist
          npm ci --omit=dev

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "pp-api-backend-prod"
          package: ./server/dist
          startup-command: "node index.js"
